<div class="social-icons" {{ with .align}}align="{{.}}" {{- end }}>
    {{- range site.Params.socialIcons }}
    {{- $url := trim .url " " }}
    {{- if $url }}
    <a href="{{ $url | safeURL }}" target="_blank" rel="noopener noreferrer me"
        title="{{ (.title | default .name) | title }}">
        {{ partial "svg.html" . }}
    </a>
    {{- else }}
    <span class="social-icon-placeholder" title="{{ (.title | default .name) | title }}" aria-label="{{ (.title | default .name) | title }}">
        {{ partial "svg.html" . }}
    </span>
    {{- end }}
    {{- end }}
</div>
